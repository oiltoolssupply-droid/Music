<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>تمرین گام ماژور</title>
<style>
:root{--bg:#f3f4f6;--card:#fff;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--ok:#15803d;--okbg:#dcfce7;--bad:#b91c1c;--badbg:#fee2e2}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Tahoma,Arial,sans-serif;line-height:1.8}
.app{max-width:900px;margin:0 auto;padding:12px 12px 40px}
.hero{background:linear-gradient(135deg,#111827,#374151);color:#fff;border-radius:24px;padding:18px;margin-bottom:14px;box-shadow:0 12px 28px #1118272e}
.hero h1{margin:0;font-size:24px}.hero p{margin:6px 0 0;color:#e5e7eb;font-size:14px}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.tab{border:none;border-radius:18px;padding:14px 10px;background:#fff;color:#111827;font-size:17px;font-weight:700;box-shadow:0 2px 10px #0001}
.tab.active{background:#111827;color:white}
.card{background:white;border:1px solid var(--line);border-radius:24px;padding:18px;margin:14px 0;box-shadow:0 2px 12px #0000000d}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
select,input,button{font-family:Tahoma,Arial,sans-serif;font-size:16px;border-radius:16px;padding:12px 14px}
select,input{border:1px solid #d1d5db;background:white;color:#111827}
button{border:none;background:#111827;color:white;cursor:pointer;font-weight:700}
button.secondary{background:#f3f4f6;color:#111827;border:1px solid #d1d5db}
.hidden{display:none!important}.small{color:var(--muted);font-size:14px}.big{font-size:23px;font-weight:800;line-height:1.7}
.kv{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}
.info{border:1px solid var(--line);border-radius:18px;padding:12px;background:#fafafa}.info b{display:block;margin-bottom:4px}
.signatureBox{direction:ltr;background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;margin:12px 0;text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center}
.signatureBox img{max-width:100%;max-height:180px;object-fit:contain;display:block}.emptyStaff{width:min(520px,100%);height:170px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.option{background:#fff;color:#111827;border:1px solid #d1d5db;min-height:58px}
.option.correct{background:var(--okbg);border-color:#22c55e;color:#14532d}.option.wrong{background:var(--badbg);border-color:#ef4444;color:#7f1d1d}
.feedback{border-radius:18px;padding:14px;margin-top:14px;font-size:16px}.feedback.ok{background:var(--okbg);color:#14532d}.feedback.bad{background:var(--badbg);color:#7f1d1d}
.scorebar{display:flex;justify-content:space-between;gap:8px;background:#f9fafb;border:1px solid var(--line);border-radius:18px;padding:10px 12px;margin-top:12px;color:#374151;font-size:14px}
.typeBox{display:flex;gap:8px;margin-top:14px}.typeBox input{flex:1;min-width:0}.footer{text-align:center;color:#6b7280;font-size:12px;margin:20px 0}
@media(max-width:640px){.kv,.options{grid-template-columns:1fr}.app{padding:10px}.hero h1{font-size:22px}.big{font-size:21px}}
</style>
</head>
<body>
<div class="app">
  <div class="hero"><h1>تمرین گام‌های ماژور 🎼</h1><p>نسخه ۲: ساده، فارسی، فقط یادگیری و آزمون، با تصویرهای صحیح سرکلید.</p></div>
  <div class="tabs"><button class="tab active" onclick="showTab('learn',this)">📚 یادگیری</button><button class="tab" onclick="showTab('test',this)">🎯 آزمون</button></div>

  <section id="learnPanel">
    <div class="card">
      <div class="row"><label for="scaleSelect"><b>انتخاب گام:</b></label><select id="scaleSelect" onchange="renderLearn()"></select></div>
      <div id="learnContent"></div>
    </div>
  </section>

  <section id="testPanel" class="hidden">
    <div class="card">
      <div class="row"><button onclick="newQuestion()">🎲 سؤال تصادفی</button><button class="secondary" onclick="resetScore()">ریست امتیاز</button></div>
      <div class="scorebar"><span>درست: <b id="correctCount">۰</b></span><span>غلط: <b id="wrongCount">۰</b></span><span>دقت: <b id="accuracy">۰٪</b></span></div>
    </div>
    <div class="card">
      <div id="question" class="big">برای شروع، روی «سؤال تصادفی» بزنید.</div>
      <div id="signatureArea"></div>
      <div id="options" class="options"></div>
      <div id="typeAnswerBox" class="typeBox hidden"><input id="typedAnswer" placeholder="پاسخ را اینجا بنویسید"><button onclick="checkTyped()">بررسی</button></div>
      <div id="feedback"></div>
    </div>
  </section>
  <div class="footer">همه چیز داخل مرورگر ذخیره می‌شود و برای استفاده روزانه نیاز به اینترنت ندارد.</div>
</div>

const faDigits = n => String(n).replace(/\d/g, d => "۰۱۲۳۴۵۶۷۸۹"[d]);
const scales = [
{id:"do",name:"دو ماژور",accType:"none",accName:"بدون علامت",count:0,altered:[],notes:["دو","ر","می","فا","سل","لا","سی","دو"],tip:"دو ماژور ساده‌ترین گام است؛ هیچ دیز یا بملی ندارد."},
{id:"sol",name:"سل ماژور",accType:"sharp",accName:"دیز",count:1,altered:["فا♯"],notes:["سل","لا","سی","دو","ر","می","فا♯","سل"],tip:"در گام‌های دیزدار، آخرین دیز را پیدا کن و نیم‌پرده بالاتر برو. فا♯ → سل."},
{id:"re",name:"ر ماژور",accType:"sharp",accName:"دیز",count:2,altered:["فا♯","دو♯"],notes:["ر","می","فا♯","سل","لا","سی","دو♯","ر"],tip:"۲ دیز یعنی فا♯ و دو♯. بعد از دو♯، گام ر ماژور است."},
{id:"la",name:"لا ماژور",accType:"sharp",accName:"دیز",count:3,altered:["فا♯","دو♯","سل♯"],notes:["لا","سی","دو♯","ر","می","فا♯","سل♯","لا"],tip:"۳ دیز یعنی فا♯، دو♯، سل♯. بعد از سل♯، گام لا ماژور است."},
{id:"mi",name:"می ماژور",accType:"sharp",accName:"دیز",count:4,altered:["فا♯","دو♯","سل♯","ر♯"],notes:["می","فا♯","سل♯","لا","سی","دو♯","ر♯","می"],tip:"۴ دیز یعنی فا♯، دو♯، سل♯، ر♯. بعد از ر♯، گام می ماژور است."},
{id:"si",name:"سی ماژور",accType:"sharp",accName:"دیز",count:5,altered:["فا♯","دو♯","سل♯","ر♯","لا♯"],notes:["سی","دو♯","ر♯","می","فا♯","سل♯","لا♯","سی"],tip:"۵ دیز یعنی فا♯، دو♯، سل♯، ر♯، لا♯. بعد از لا♯، گام سی ماژور است."},
{id:"fa",name:"فا ماژور",accType:"flat",accName:"بمل",count:1,altered:["سی♭"],notes:["فا","سل","لا","سی♭","دو","ر","می","فا"],tip:"فا ماژور تنها گام بمل‌دار این نسخه است و فقط سی♭ دارد."}
];
let score = JSON.parse(localStorage.getItem("musicTheoryV2Score") || '{"correct":0,"wrong":0}');
let currentQuestion=null, locked=false;
function saveScore(){localStorage.setItem("musicTheoryV2Score",JSON.stringify(score))}
function updateScore(){const t=score.correct+score.wrong; const a=t?Math.round(score.correct/t*100):0; correctCount.textContent=faDigits(score.correct); wrongCount.textContent=faDigits(score.wrong); accuracy.textContent=faDigits(a)+"٪"}
function resetScore(){score={correct:0,wrong:0};saveScore();updateScore()}
function byId(id){return scales.find(s=>s.id===id)} function rand(a){return a[Math.floor(Math.random()*a.length)]} function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function accText(s){if(s.count===0)return"بدون علامت";const sym=s.accType==="sharp"?"♯":"♭";return `${faDigits(s.count)} ${s.accName} (${sym.repeat(s.count)})`}
function alteredText(s){return s.altered.length?s.altered.join("، "):"—"}
function signatureHTML(s){let inner=""; if(s.id==="do"){inner=`<svg class="emptyStaff" viewBox="0 0 520 170" aria-label="سرکلید دو ماژور"><line x1="40" y1="45" x2="480" y2="45" stroke="#111" stroke-width="2"/><line x1="40" y1="65" x2="480" y2="65" stroke="#111" stroke-width="2"/><line x1="40" y1="85" x2="480" y2="85" stroke="#111" stroke-width="2"/><line x1="40" y1="105" x2="480" y2="105" stroke="#111" stroke-width="2"/><line x1="40" y1="125" x2="480" y2="125" stroke="#111" stroke-width="2"/><text x="58" y="123" font-size="78" font-family="serif">𝄞</text></svg>`}else{inner=`<img src="${imageData[s.id]}" alt="سرکلید">`} return `<div class="signatureBox">${inner}</div>`}
function fillScaleSelect(){scaleSelect.innerHTML=scales.map(s=>`<option value="${s.id}">${s.name}</option>`).join("")}
function renderLearn(){const s=byId(scaleSelect.value)||scales[0]; learnContent.innerHTML=`${signatureHTML(s)}<h2>${s.name}</h2><div class="kv"><div class="info"><b>علائم سرکلید</b>${accText(s)}</div><div class="info"><b>نت‌های تغییر یافته</b>${alteredText(s)}</div><div class="info"><b>نت‌های گام</b>${s.notes.join("، ")}</div><div class="info"><b>نکته حفظی</b>${s.tip}</div></div>`}
function showTab(tab,btn){learnPanel.classList.toggle("hidden",tab!=="learn");testPanel.classList.toggle("hidden",tab!=="test");document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));btn.classList.add("active")}
function normalise(s){return String(s||"").trim().replace(/\s+/g," ").replace(/ي/g,"ی").replace(/ك/g,"ک").replace(/‌/g," ")}
function same(a,b){return normalise(a)===normalise(b)}
function optionButtons(opts){typeAnswerBox.classList.add("hidden");options.innerHTML=opts.map(o=>`<button class="option" onclick="checkAnswer('${String(o).replace(/'/g,"\\'")}',this)">${o}</button>`).join("")}
function textAnswerBox(){options.innerHTML="";typeAnswerBox.classList.remove("hidden");typedAnswer.value="";typedAnswer.focus()}
function makeQuestion(){const types=["signatureToScale","scaleToCount","countToScale","scaleToAccType","scaleToAltered","alteredToScale","typeScaleName","trueFalse"];let type=rand(types), s=rand(scales), q={type,scale:s,question:"",answer:"",signature:"",options:null,typed:false};
 if(type==="signatureToScale"){q.question="این سرکلید مربوط به کدام گام است؟";q.signature=signatureHTML(s);q.answer=s.name;q.options=shuffle([s.name,...shuffle(scales.filter(x=>x.id!==s.id)).slice(0,3).map(x=>x.name)])}
 if(type==="scaleToCount"){q.question=`گام ${s.name} چند دیز یا بمل دارد؟`;q.answer=accText(s);let all=[...new Set(scales.map(accText))];q.options=shuffle([q.answer,...shuffle(all.filter(x=>x!==q.answer)).slice(0,3)])}
 if(type==="countToScale"){s=rand(scales.filter(x=>x.count>0));q.scale=s;q.question=`کدام گام دارای ${accText(s)} است؟`;q.answer=s.name;q.options=shuffle([s.name,...shuffle(scales.filter(x=>x.id!==s.id)).slice(0,3).map(x=>x.name)])}
 if(type==="scaleToAccType"){q.question=`گام ${s.name} از نظر علائم سرکلید کدام است؟`;q.answer=s.count===0?"بدون علامت":s.accName;q.options=shuffle(["دیز","بمل","بدون علامت","دیز و بمل"])}
 if(type==="scaleToAltered"){q.question=`نت‌های تغییر یافته در ${s.name} کدام است؟`;q.answer=alteredText(s);let all=[...new Set(scales.map(alteredText))];q.options=shuffle([q.answer,...shuffle(all.filter(x=>x!==q.answer)).slice(0,3)])}
 if(type==="alteredToScale"){q.question=`${alteredText(s)} مربوط به کدام گام است؟`;q.answer=s.name;q.options=shuffle([s.name,...shuffle(scales.filter(x=>x.id!==s.id)).slice(0,3).map(x=>x.name)])}
 if(type==="typeScaleName"){q.question="نام گام این سرکلید را تایپ کنید.";q.signature=signatureHTML(s);q.answer=s.name;q.typed=true}
 if(type==="trueFalse"){let statementTrue=Math.random()>.5;let shown=statementTrue?s:rand(scales.filter(x=>x.id!==s.id));q.question=`درست یا نادرست؟ این سرکلید مربوط به «${shown.name}» است.`;q.signature=signatureHTML(s);q.answer=statementTrue?"درست":"نادرست";q.options=["درست","نادرست"]}
 return q}
function newQuestion(){locked=false;currentQuestion=makeQuestion();question.innerHTML=currentQuestion.question;signatureArea.innerHTML=currentQuestion.signature||"";feedback.innerHTML="";currentQuestion.typed?textAnswerBox():optionButtons(currentQuestion.options)}
function checkTyped(){checkAnswer(typedAnswer.value,null)}
function checkAnswer(ans,btn){if(locked||!currentQuestion)return;locked=true;let ok=same(ans,currentQuestion.answer); if(btn){document.querySelectorAll(".option").forEach(b=>{b.disabled=true;if(same(b.textContent,currentQuestion.answer))b.classList.add("correct")});if(!ok)btn.classList.add("wrong")} ok?score.correct++:score.wrong++;saveScore();updateScore();let s=currentQuestion.scale;feedback.innerHTML= ok?`<div class="feedback ok">✅ آفرین! پاسخ صحیح است.</div>`:`<div class="feedback bad">❌ پاسخ شما: <b>${ans||"—"}</b><br>✅ پاسخ صحیح: <b>${currentQuestion.answer}</b><br><br><b>${s.name}</b> دارای ${accText(s)} است.<br>نت‌های تغییر یافته: ${alteredText(s)}<br>نت‌های گام: ${s.notes.join("، ")}</div>`;setTimeout(newQuestion,1800)}
document.addEventListener("keydown",e=>{if(e.key==="Enter"&&!typeAnswerBox.classList.contains("hidden"))checkTyped()});
fillScaleSelect();renderLearn();updateScore();
</script>
